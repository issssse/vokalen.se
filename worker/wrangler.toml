name = "vokalen-dev"
main = "src/index.js"
compatibility_date = "2026-04-22"

[vars]
GITHUB_OWNER = "issssse"
GITHUB_REPO = "vokalen.se"
GITHUB_BRANCH = "dev"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/content/*", "/images/uploads/*"]

[[routes]]
pattern = "dev.vokalen.se"
custom_domain = true

[observability.logs]
enabled = true
